<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages 主页</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#f5f7fa;color:#222;padding:40px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
        .box{max-width:700px;width:100%;background:#fff;border-radius:14px;padding:40px;box-shadow:0 2px 16px #00000010}
        h1{color:#2563eb;margin-bottom:16px}
        p{line-height:1.7;color:#555;margin-bottom:12px}
        .tip{margin-top:24px;padding:12px;background:#eff6ff;border-radius:8px;color:#2563eb}
    </style>
</head>
<body>
<div class="box">
    <h1>✅ GitHub Pages 部署成功</h1>
    <p>你的静态网站已经正常在线，域名格式：用户名.github.io</p>
    <p>可自行修改本页面文字、引入JS、CSS、图片资源。</p>
    <div class="tip">提示：替换代码即可改成个人主页、导航页、工具站</div>
</div>
</body>
</html>
